<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Final Exam</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #4f46e5);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:80%;
            max-width:800px;
            padding:50px;
            text-align:center;

            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.3);
        }

        h1{
            color:#ffffff;
            font-size:2.5rem;
            margin-bottom:20px;
            letter-spacing:1px;
        }

        h2{
            color:#93c5fd;
            font-size:1.6rem;
            margin-bottom:15px;
            font-weight:500;
        }

        h3{
            color:#e2e8f0;
            font-size:1.3rem;
            text-transform:uppercase;
            letter-spacing:3px;
        }

        .divider{
            width:120px;
            height:4px;
            background:#60a5fa;
            margin:25px auto;
            border-radius:5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Angel Diolola</h1>

        <div class="divider"></div>

        <h2>Course & Section: CpE-4-A</h2>
        <h3>AWS Final Exam Deployment</h3>
    </div>

</body>
</html>
